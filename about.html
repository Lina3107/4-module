<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About</title>
    <link rel="stylesheet" href="stylesheets/style.css" />
    <script defer src="javascripts/scripts.js"></script>
  </head>
  <body class="about-page">
    <nav class="siteNav" aria-label="Primary">
      <a class="siteNav__link is-active" href="about.html">
        <span class="siteNav__number">1</span>
        <span class="siteNav__label">About</span>
      </a>
      <a class="siteNav__link" href="collection.html">
        <span class="siteNav__number">2</span>
        <span class="siteNav__label">Collection</span>
      </a>
      <a class="siteNav__link" href="manifesto.html">
        <span class="siteNav__number">3</span>
        <span class="siteNav__label">Manifesto</span>
      </a>
      <a class="siteNav__link" href="brochure.html">
        <span class="siteNav__number">4</span>
        <span class="siteNav__label">Brochure</span>
      </a>
    </nav>
    <main class="aboutLayout">
      <section class="aboutHero">
        <img src="images/birka.svg" alt="About background" />

        <div class="aboutHero__copy" aria-label="About statement">
          <span class="aboutHero__line">DETAG</span>
          <span class="aboutHero__line">IS A CONSCIOUS</span>
          <span class="aboutHero__line aboutHero__line--offset-1">CLOTHING</span>
          <span class="aboutHero__line aboutHero__line--offset-2">BRAND</span>
          <span class="aboutHero__line aboutHero__line--offset-3">CREATED FROM</span>
          <span class="aboutHero__line aboutHero__line--offset-1">RECYCLED</span>
          <span class="aboutHero__line aboutHero__line--offset-2">AND EXISTING</span>
          <span class="aboutHero__line">MATERIALS.</span>
          <span class="aboutHero__line aboutHero__line--offset-1">WE REDUCE VISUAL</span>
          <span class="aboutHero__line">NOISE,</span>
          <span class="aboutHero__line aboutHero__line--offset-1">RETHINK</span>
          <span class="aboutHero__line aboutHero__line--offset-2">FAMILIAR</span>
          <span class="aboutHero__line">FORMS</span>
          <span class="aboutHero__line">AND CREATE</span>
          <span class="aboutHero__line aboutHero__line--offset-1">TIMELESS</span>
          <span class="aboutHero__line">PIECES</span>
          <span class="aboutHero__line">FOR LONG-TERM</span>
          <span class="aboutHero__line aboutHero__line--offset-2">WEAR</span>
        </div>

        <form class="aboutSubscribe">
          <img
            class="aboutSubscribe__background"
            src="images/step.svg"
            alt=""
          />
          <input type="text" name="name" placeholder="Name*" />
          <input type="email" name="email" placeholder="E-mail address*" />
          <button class="aboutSubscribe__submit" type="submit">Subscribe</button>
        </form>
      </section>
    </main>
  </body>
</html>
